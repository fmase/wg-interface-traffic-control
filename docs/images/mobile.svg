  <text x="44" y="432" fill="#8fa2be" font-size="10" font-family="Inter,Segoe UI,Arial,sans-serif">ENDPOINT</text>
  <text x="44" y="450" fill="#d9e4f8" font-size="12" font-family="Inter,Segoe UI,Arial,sans-serif">endpoint-host:port</text>
